<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成品出貨掃瞄 (雙模式)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        html { height: 100%; }
        
        body { 
            font-family: sans-serif; text-align: center; margin: 0; padding: 8px; 
            height: 100%; display: flex; flex-direction: column; overflow: hidden; background-color: #f4f6f9;
            box-sizing: border-box; 
        }
        
        h3 { margin: 0 0 10px 0; font-size: 18px; color: #333; flex: 0 0 auto; }

        .mode-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex: 0 0 auto; }
        .mode-btn { 
            flex: 1; padding: 8px; font-size: 16px; border: 2px solid #007bff; background: white; 
            color: #007bff; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .mode-btn.active { background: #007bff; color: white; }

        .scanner-container { flex: 0 0 auto; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        
        #reader { width: 100%; max-width: 220px; border-radius: 8px; overflow: hidden; display: none; }
        
        #ir-container { display: none; width: 100%; flex-direction: column; align-items: center; position: relative; }
        
        .ir-status-box {
            width: 80%; padding: 15px; font-size: 16px; text-align: center; font-weight: bold;
            border: 2px dashed #28a745; border-radius: 5px; background-color: #e8f5e9; color: #2e7d32;
        }
        .ir-hint { font-size: 12px; color: #666; margin-top: 5px; }

        #hidden-ir-input {
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            width: 1px; height: 1px;
            border: none;
            font-size: 16px; 
            pointer-events: none;
        }

        .info-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; min-height: 0; }
        
        #stored-qr1 { font-size: 15px; color: #0056b3; font-weight: bold; background: #e2eef9; padding: 8px; border-radius: 5px; flex: 0 0 auto; }
        
        #result-container { 
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; 
            font-size: 18px; font-weight: bold; border: 2px solid #ccc; border-radius: 8px; white-space: pre-wrap;
            overflow-y: auto; 
        }
        
        .ok-bg { background-color: #d4edda; color: #155724; border-color: #c3e6cb !important; }
        .ng-bg { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb !important; }
        .info-bg { background-color: #e2e3e5; color: #383d41; border-color: #d6d8db !important; }
        
        .reset-btn { 
            width: 100%; padding: 12px; font-size: 18px; font-weight: bold; cursor: pointer; 
            background-color: #dc3545; color: white; border: none; border-radius: 5px; flex: 0 0 auto; margin-top: 5px; margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h3>出貨比對系統</h3>

    <div class="mode-switch">
        <button id="btn-camera" class="mode-btn" onclick="setMode('camera')">📷 相機掃描</button>
        <button id="btn-ir" class="mode-btn active" onclick="setMode('ir')">⚡ 紅外線 (PDA)</button>
    </div>

    <div class="scanner-container">
        <div id="reader"></div>
        <div id="ir-container">
            <div class="ir-status-box">全域掃描已啟動<br>無須點擊，請直接連續掃描</div>
            <div class="ir-hint">系統於背景自動擷取 PDA 訊號</div>
            <input type="text" id="hidden-ir-input" onkeydown="handleHiddenInput(event)" autocomplete="off">
        </div>
    </div>

    <div class="info-panel">
        <div id="stored-qr1">目前狀態：讀取中...</div>
        <div id="result-container" class="info-bg">請選擇模式並掃描 QR Code</div>
    </div>

    <button id="reset-btn-element" class="reset-btn" onclick="resetQR1()">產生新事件 (換箱/新工單)</button>

    <script>
        let storedQR1 = JSON.parse(localStorage.getItem('savedQR1_data'));
        let currentMode = 'ir'; 
        let html5QrcodeScanner = null;
        const hiddenInput = document.getElementById('hidden-ir-input');
        const resetButton = document.getElementById('reset-btn-element');

        function handleHiddenInput(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); 
                const inputValue = event.target.value;
                if (inputValue.trim() !== '') {
                    processScanResult(inputValue);
                    event.target.value = ''; 
                }
                setTimeout(enforceFocus, 10); 
            }
        }

        function enforceFocus() {
            if (currentMode === 'ir') {
                hiddenInput.focus();
            }
        }

        document.body.addEventListener('click', enforceFocus);
        document.body.addEventListener('touchstart', enforceFocus);
        
        hiddenInput.addEventListener('blur', () => {
            if (currentMode === 'ir') {
                setTimeout(() => hiddenInput.focus(), 10);
            }
        });

        function updateUI() {
            const resultDiv = document.getElementById('result-container');
            if (storedQR1) {
                document.getElementById('stored-qr1').innerText = `【記憶已載入】\n工單: ${storedQR1.workOrder} | Lot: ${storedQR1.lotNo}`;
                if (resultDiv.className === "info-bg") {
                    resultDiv.innerText = "已就緒，請直接掃描成品 QR2";
                }
            } else {
                document.getElementById('stored-qr1').innerText = "【等待掃描包裝明細 QR1】";
                resultDiv.innerText = "請掃描 QR1";
                resultDiv.className = "info-bg";
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-camera').classList.toggle('active', mode === 'camera');
            document.getElementById('btn-ir').classList.toggle('active', mode === 'ir');
            
            const resultDiv = document.getElementById('result-container');

            if (mode === 'camera') {
                document.getElementById('ir-container').style.display = 'none';
                document.getElementById('reader').style.display = 'block';
                hiddenInput.blur(); 
                if(!html5QrcodeScanner) {
                    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 150, height: 150 } }, false);
                    html5QrcodeScanner.render(processScanResult, onScanFailure);
                }
            } else {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('ir-container').style.display = 'flex';
                hiddenInput.value = ''; 
                enforceFocus(); 
                if(html5QrcodeScanner) {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                }
            }
        }

        function processScanResult(decodedText) {
            const dataParts = decodedText.trim().split(/\s+/); 
            const resultDiv = document.getElementById('result-container');

            if (!storedQR1) {
                if (dataParts.length >= 2) {
                    storedQR1 = { workOrder: dataParts[0], lotNo: dataParts[1] };
                    localStorage.setItem('savedQR1_data', JSON.stringify(storedQR1));
                    resultDiv.innerText = "QR1 記錄成功！\n請接續掃描成品 QR2";
                    resultDiv.className = "info-bg";
                    updateUI();
                } else {
                    resultDiv.innerText = "NG：QR1 格式錯誤\n請重新掃描";
                    resultDiv.className = "ng-bg";
                }
            } else {
                if (dataParts.length >= 5) {
                    const qr2LotNo = dataParts[1];
                    const qr2WorkOrder = dataParts[3];

                    if (storedQR1.workOrder === qr2WorkOrder && storedQR1.lotNo === qr2LotNo) {
                        resultDiv.innerText = `OK\n工單：${qr2WorkOrder}\nLot：${qr2LotNo}`;
                        resultDiv.className = "ok-bg";
                    } else {
                        resultDiv.innerText = `NG\n預期工單: ${storedQR1.workOrder}\n實際工單: ${qr2WorkOrder}`;
                        resultDiv.className = "ng-bg";
                    }
                } else {
                    resultDiv.innerText = "NG：QR2 格式錯誤\n請重新掃描";
                    resultDiv.className = "ng-bg";
                }
            }
            
            if(currentMode === 'camera' && html5QrcodeScanner) {
                html5QrcodeScanner.pause(true);
                setTimeout(() => html5QrcodeScanner.resume(), 1500); 
            }
        }

        function onScanFailure(error) { }

        function resetQR1() {
            if (confirm("清除目前 QR1 紀錄？")) {
                storedQR1 = null;
                localStorage.removeItem('savedQR1_data');
                updateUI();
            }
            
            // 關鍵修正：推遲焦點捕獲，避開瀏覽器渲染阻塞期
            setTimeout(() => {
                resetButton.blur(); // 強制移除按鈕本身的焦點
                enforceFocus();     // 將焦點重新鎖定到隱藏輸入框
            }, 100); // 100 毫秒的緩衝時間足以應付多數 PDA 設備的延遲
        }

        updateUI();
        setMode('ir'); 
        
        window.onload = enforceFocus;
    </script>
</body>
</html>
